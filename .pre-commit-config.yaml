# To use:
#
#     pre-commit run -a
#
# Or:
#
#     pre-commit install  # (runs every time you commit in git)
#
# To update this file:
#
#     pre-commit autoupdate
#
# See https://github.com/pre-commit/pre-commit

repos:
# Standard hooks
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: check-added-large-files
  - id: check-docstring-first
  - id: check-merge-conflict
  - id: check-symlinks
  - id: check-xml
  - id: check-yaml
    args: [--allow-multiple-documents]
  - id: end-of-file-fixer
  - id: mixed-line-ending
  - id: trailing-whitespace
    exclude_types: [rst, markdown]

# XML Formatting
- repo: https://github.com/efrecon/pre-commit-hook-lxml
  rev: v0.1.4
  hooks:
  - id: format-xml
    files: \.(xml|urdf|srdf|xacro)$
    exclude: (^|/)package\.xml$
    args: [--write, --self-closing, nospace]


# YAML Formatting
- repo: https://github.com/macisamuele/language-formatters-pre-commit-hooks
  rev: v2.15.0
  hooks:
  - id: pretty-format-yaml
    args: [--autofix, --indent, '2', --offset, '0']

# CPP Checks
- repo: https://github.com/pre-commit/mirrors-clang-format
  rev: v20.1.4
  hooks:
  - id: clang-format
    name: Clang Format
    args: [--style=file]
    files: \.(cpp|hpp|h|c|cc)$

- repo: local
  hooks:
  - id: cppcheck
    name: Cppcheck
    entry: bash -c "cppcheck --force --quiet --inline-suppr --error-exitcode=1 --language=c++  -DGST_TIME_FORMAT=\"\" -DG_DEFINE_TYPE_WITH_PRIVATE\(Args...\)=\"\" $(find . -type d -name 'cmake-build-*' -prune -false -o -name '*.cpp' -o -name '*.hpp' -o -name '*.h' -o -name '*.c' -o -name '*.cc')"
    language: system
    files: \.(cpp|cc|hpp|h)$
    pass_filenames: false

# Package XML
- repo: https://github.com/Joschi3/package_xml_validation.git
  rev: v1.3.0
  hooks:
  - id: format-package-xml
    name: Validate and Format package.xml
